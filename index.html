<!DOCTYPE html>
<html>
<body>
<h2>اضغط لمشاركة الشاشة</h2>
<button id="shareBtn">مشاركة</button>

<p id="status"></p>

<script>
document.getElementById("shareBtn").onclick = async function () {
    try {
        const stream = await navigator.mediaDevices.getDisplayMedia({
            video: true,
            audio: false
        });

        document.getElementById("status").innerText = "تم بدء مشاركة الشاشة ✔";

        const video = document.createElement("video");
        video.srcObject = stream;
        video.autoplay = true;
        video.style.width = "100%";
        document.body.appendChild(video);

        stream.getVideoTracks()[0].onended = () => {
            document.getElementById("status").innerText = "تم إيقاف مشاركة الشاشة ✖";
        };

    } catch (err) {
        document.getElementById("status").innerText =
            "حدث خطأ: " + err.message;
    }
};
</script>
</body>
</html>
